<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>Kids Diary - Diary</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <h1>Kids Diary</h1>
        <p>Daily timeline</p>
      </div>
      <nav class="nav">
        <a href="./index.html">Gallery</a>
        <a href="./diary.html" class="active">Diary</a>
      </nav>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-header">
          <h2>New entry</h2>
        </div>
        <div id="config-banner" class="banner warning hidden">
          <strong>Supabase is not configured.</strong>
          <span>Update config.js with your project URL and anon key.</span>
        </div>
        <form id="entry-form" class="stack">
          <label class="field">
            Date
            <input id="entry-date" type="date" required />
          </label>
          <label class="field">
            Entry
            <textarea
              id="entry-content"
              rows="4"
              placeholder="Write a short note..."
              required
            ></textarea>
          </label>
          <div class="form-actions">
            <button type="submit" class="button">Save entry</button>
            <button type="reset" class="button-secondary">Clear</button>
          </div>
        </form>
        <p id="entry-status" class="status-message"></p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Timeline</h2>
          <button
            id="refresh-entries"
            class="button-secondary"
            type="button"
          >
            Refresh
          </button>
        </div>
        <p id="timeline-status" class="status-message"></p>
        <div id="timeline" class="timeline"></div>
        <div id="timeline-empty" class="empty-state hidden">
          No entries yet.
        </div>
      </section>
    </main>

    <script type="module" src="./diary.js"></script>
  </body>
</html>
